apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: istio-failover-demo
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  description: GitOps project for the istio-failover-demo repository
  sourceRepos:
    - https://github.com/Shrubberer/istio-failover-demo.git
    - git@github.com:Shrubberer/istio-failover-demo.git
  destinations:
    - namespace: istio-failover-demo
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
