apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-failover-demo-mesh
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: istio-failover-demo
  source:
    repoURL: https://github.com/Shrubberer/istio-failover-demo.git
    targetRevision: main
    path: charts/hello-failover-mesh
    helm:
      releaseName: hello-failover-mesh
      valueFiles:
        - values-test.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-failover-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
