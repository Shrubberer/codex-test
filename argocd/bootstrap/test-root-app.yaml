apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: codex-test-test
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/Shrubberer/codex-test.git
    targetRevision: main
    path: argocd/environments/test
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
