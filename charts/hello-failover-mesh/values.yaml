serviceMeshMember:
  enabled: true
  name: default
  controlPlane:
    name: codex-mesh
    namespace: istio-system

mesh:
  serviceName: hello-mesh
  ingress:
    enabled: true
    gatewayName: hello-mesh-ingress
    selector:
      istio: ingressgateway
    host: hello-mesh-codex-test.apps-crc.testing
    port:
      name: http
      number: 80
      protocol: HTTP
  retries:
    attempts: 2
    perTryTimeout: 2s
    retryOn: 5xx,connect-failure,refused-stream,reset,gateway-error
  outlierDetection:
    consecutive5xxErrors: 1
    interval: 5s
    baseEjectionTime: 30s
    maxEjectionPercent: 100
  failoverPriority:
    - failover-role
  subsets:
    - name: primary
      failoverRole: primary
    - name: secondary
      failoverRole: secondary

meshClient:
  enabled: true
  name: mesh-client
  failoverRole: primary
  image: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest
