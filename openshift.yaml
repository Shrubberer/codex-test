apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: hello-world
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: hello-world
spec:
  source:
    type: Binary
  strategy:
    sourceStrategy:
      from:
        kind: ImageStreamTag
        name: java:openjdk-17-ubi8
        namespace: openshift
  output:
    to:
      kind: ImageStreamTag
      name: hello-world:latest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-primary
  labels:
    app: hello-world
    failover-role: primary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-world
      failover-role: primary
  template:
    metadata:
      labels:
        app: hello-world
        failover-role: primary
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8080"
    spec:
      containers:
      - name: hello-world
        image: image-registry.openshift-image-registry.svc:5000/codex-test/hello-world:latest
        imagePullPolicy: Always
        env:
        - name: APP_INSTANCE_NAME
          value: primary
        - name: APP_REPLY_MESSAGE
          value: hello from primary version 0.1.0
        - name: APP_VERSION
          value: 0.1.0
        - name: APP_FAULT_ENABLED
          value: "true"
        - name: APP_FAULT_TRIGGER_INPUT
          value: fail-primary
        - name: APP_FAULT_STATUS_CODE
          value: "503"
        ports:
        - containerPort: 8080
          name: http
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-secondary
  labels:
    app: hello-world
    failover-role: secondary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-world
      failover-role: secondary
  template:
    metadata:
      labels:
        app: hello-world
        failover-role: secondary
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8080"
    spec:
      containers:
      - name: hello-world
        image: image-registry.openshift-image-registry.svc:5000/codex-test/hello-world:latest
        imagePullPolicy: Always
        env:
        - name: APP_INSTANCE_NAME
          value: secondary
        - name: APP_REPLY_MESSAGE
          value: hello from secondary version 0.1.0
        - name: APP_VERSION
          value: 0.1.0
        - name: APP_FAULT_ENABLED
          value: "false"
        - name: APP_FAULT_TRIGGER_INPUT
          value: fail-primary
        - name: APP_FAULT_STATUS_CODE
          value: "503"
        ports:
        - containerPort: 8080
          name: http
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: hello-primary
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /actuator/prometheus
    prometheus.io/port: "8080"
spec:
  selector:
    app: hello-world
    failover-role: primary
  ports:
  - name: http
    port: 8080
    targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: hello-secondary
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /actuator/prometheus
    prometheus.io/port: "8080"
spec:
  selector:
    app: hello-world
    failover-role: secondary
  ports:
  - name: http
    port: 8080
    targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: hello-mesh
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /actuator/prometheus
    prometheus.io/port: "8080"
spec:
  selector:
    app: hello-world
  ports:
  - name: http
    port: 8080
    targetPort: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: hello-primary
spec:
  to:
    kind: Service
    name: hello-primary
  port:
    targetPort: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: hello-secondary
spec:
  to:
    kind: Service
    name: hello-secondary
  port:
    targetPort: http
